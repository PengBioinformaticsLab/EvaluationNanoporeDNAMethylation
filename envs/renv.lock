      "Date": "2012-08-30",
      "Authors@R": "c( person(\"Wacek\", \"Kusnierczyk\", role=c(\"aut\", \"cre\"), email=\"waku@idi.ntnu.no\"), person(\"Dirk\", \"Eddelbuettel\", role=\"ctb\", email=\"edd@debian.org\"), person(\"Berend\", \"Hasselman\", role=\"ctb\", email=\"bhh@xs4all.nl\"))",
